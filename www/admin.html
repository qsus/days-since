<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Počet dní od (admin) – MFF UK</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #888888;
            --accent: #4af626; 
            --accent-dim: #2b7a18;
            --danger: #ff5555;
            --danger-dim: #880000;
            --border: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        .terminal-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-actions { display: flex; gap: 1rem; }
        .prompt { color: var(--accent); font-weight: bold; }
        .path { color: #569cd6; }

        input, select {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: inherit;
            padding: 0.3rem;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus { outline: none; border-color: var(--accent); }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            font-family: inherit;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: var(--border); }
        .btn.action-btn { color: var(--accent); border-color: var(--accent-dim); }
        .btn.action-btn:hover { background: var(--accent-dim); color: #fff; }
        .btn.danger-btn { color: var(--danger); border-color: var(--danger-dim); }
        .btn.danger-btn:hover { background: var(--danger-dim); color: #fff; }

        .auth-bar {
            background: var(--surface);
            padding: 1rem;
            border-left: 4px solid var(--danger);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .auth-bar input[type="password"] { width: 200px; color: var(--text); }
        
        .remember-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }

        .counter-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            position: relative;
        }

        .counter-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background-color: var(--accent-dim);
        }

        .counter-card.new-card::before { background-color: #569cd6; }

        .counter-value { font-size: 1.5rem; color: var(--accent); text-shadow: 0 0 8px rgba(74, 246, 38, 0.2); margin-bottom: 1rem; }

        .form-group { margin-bottom: 0.8rem; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.2rem; }
        .actions { margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

        #log {
            margin-bottom: 2rem;
            padding: 1rem;
            background: #000;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .log-ok { color: var(--accent); }
        .log-err { color: var(--danger); }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div>
            <span class="prompt">root@matfyz</span>:<span class="path">/root</span>$ ./manage.sh
        </div>
        <div class="header-actions">
            <a href="/" class="btn action-btn">[~] VIEW STATUS</a>
            <button class="btn danger-btn" onclick="triggerLockout()">[!] INITIATE LOCKOUT</button>
        </div>
    </div>

    <div id="log"></div>

    <div class="auth-bar">
        <label>SUDO PASSWORD:</label>
        <input type="password" id="auth-pass" placeholder="***" autocomplete="off">
        
        <label class="remember-wrapper">
            <input type="checkbox" id="remember-pass"> REMEMBER
        </label>
    </div>

    <div class="grid" id="counters-grid"></div>

    <script>
        let counters = [];

        const escapeHtml = (str) => (str || '').toString().replace(/[&<"'>]/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}[m]));

        // --- Time Formatting (Shared Logic) ---
        const formatDays = (d) => {
            if (d === 1) return '1 den';
            if (d >= 2 && d <= 4) return `${d} dny`;
            return `${d} dní`;
        };

        const formatTime = (totalSeconds, precision) => {
            if (totalSeconds < 0) totalSeconds = 0;
            const d = Math.floor(totalSeconds / 86400);
            const h = Math.floor((totalSeconds % 86400) / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            const daysStr = d > 0 ? `${formatDays(d)} ` : '';

            switch (precision) {
                case 'day': return formatDays(d);
                case 'few-hours':
                case 'hour': return `${daysStr}${h}h`;
                case 'minute': return `${daysStr}${h}h ${m}m`;
                case 'second':
                default: return `${daysStr}${h}h ${m}m ${s}s`;
            }
        };

        // --- Auth Setup ---
        const passInput = document.getElementById('auth-pass');
        const rememberBox = document.getElementById('remember-pass');

        passInput.value = localStorage.getItem('sudo_pass') || '';
        rememberBox.checked = !!passInput.value;

        const handleAuthChange = () => {
            if (rememberBox.checked) localStorage.setItem('sudo_pass', passInput.value);
            else localStorage.removeItem('sudo_pass');
        };

        passInput.addEventListener('input', handleAuthChange);
        rememberBox.addEventListener('change', handleAuthChange);

        // --- API & Logging ---
        const logMsg = (msg, isError = false) => {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `<div class="${isError ? 'log-err' : 'log-ok'}">[${time}] ${escapeHtml(msg)}</div>` + log.innerHTML;
        };

        const apiCall = async (endpoint, method, payload = null) => {
            const pass = passInput.value;
            if (!pass) {
                logMsg("Error: Password is required!", true);
                throw new Error("Missing password");
            }

            try {
                const options = {
                    method,
                    headers: {
                        'Authorization': 'Basic ' + btoa(':' + pass),
                        'Content-Type': 'application/json'
                    }
                };
                if (payload) options.body = JSON.stringify(payload);

                const res = await fetch(endpoint, options);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Unknown API error');
                
                logMsg(`${method} ${endpoint} -> OK`);
                return data;
            } catch (err) {
                logMsg(`${method} ${endpoint} -> ${err.message}`, true);
                throw err;
            }
        };

        // --- UI Rendering ---
        const unixToDatetimeLocal = (unixSeconds) => {
            if (!unixSeconds) return '';
            const d = new Date(unixSeconds * 1000);
            const pad = n => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const buildCard = (counter = null) => {
            const isNew = !counter;
            const c = counter || { name: '', description: '', timestamp: null, precision: 'day', info: '' };
            const id = isNew ? 'new' : escapeHtml(c.name);
            const precisions = ['day', 'few-hours', 'hour', 'minute', 'second'];
            
            const autoSaveAttr = isNew ? '' : `onchange="saveCounter('${id}')"`;

            return `
                <div class="counter-card ${isNew ? 'new-card' : ''}" id="card-${id}">
                    <div class="counter-value" id="val-${id}">...</div>
                    <div class="form-group">
                        <label>NAME (ID)</label>
                        <input type="text" id="name-${id}" value="${id === 'new' ? '' : id}" ${!isNew ? 'disabled' : 'placeholder="e.g. fire"'}>
                    </div>
                    <div class="form-group">
                        <label>DESCRIPTION</label>
                        <input type="text" id="desc-${id}" value="${escapeHtml(c.description)}">
                    </div>
                    <div class="form-group">
                        <label>INFO (Detail)</label>
                        <input type="text" id="info-${id}" value="${escapeHtml(c.info)}">
                    </div>
                    <div class="form-group">
                        <label>PRECISION</label>
                        <select id="prec-${id}" ${autoSaveAttr}>
                            ${precisions.map(p => `<option value="${p}" ${c.precision === p ? 'selected' : ''}>${p}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>TIMESTAMP (Empty = Now)</label>
                        <input type="datetime-local" id="ts-${id}" value="${unixToDatetimeLocal(c.timestamp)}">
                    </div>
                    <div class="actions">
                        ${isNew 
                            ? `<button class="btn action-btn" onclick="saveCounter('new')">[+] CREATE</button>`
                            : `<button class="btn action-btn" onclick="saveCounter('${id}')">SAVE</button>
                               <button class="btn" onclick="resetCounter('${id}')">RESET TO NOW</button>
                               <button class="btn danger-btn" onclick="deleteCounter('${id}')">DELETE</button>`
                        }
                    </div>
                </div>`;
        };

        const loadCounters = async () => {
            try {
                const res = await fetch('/counters');
                counters = await res.json();
                
                const grid = document.getElementById('counters-grid');
                grid.innerHTML = buildCard(null) + counters.map(buildCard).join('');
                tick(); // Immediate update on load
            } catch (err) {
                logMsg(`Failed to load counters: ${err.message}`, true);
            }
        };

        const tick = () => {
            const now = Math.floor(Date.now() / 1000);
            counters.forEach(c => {
                const el = document.getElementById(`val-${escapeHtml(c.name)}`);
                // Use the select's actual value for preview if it was changed without reload
                const precDropdown = document.getElementById(`prec-${escapeHtml(c.name)}`);
                const activePrecision = precDropdown ? precDropdown.value : c.precision;
                
                if (el) el.innerText = formatTime(Math.max(0, now - c.timestamp), activePrecision);
            });
            
            // New card dummy tick
            const newEl = document.getElementById('val-new');
            if (newEl) newEl.innerText = "[ NOVÉ POČÍTADLO ]";
        };

        // --- Actions ---
        window.saveCounter = async (id) => {
            const name = document.getElementById(`name-${id}`).value.trim();
            if (!name) return logMsg("Name cannot be empty", true);

            const tsInput = document.getElementById(`ts-${id}`).value;
            const finalTimestamp = tsInput ? Math.floor(new Date(tsInput).getTime() / 1000) : Math.floor(Date.now() / 1000);

            const payload = {
                description: document.getElementById(`desc-${id}`).value,
                info: document.getElementById(`info-${id}`).value,
                precision: document.getElementById(`prec-${id}`).value,
                timestamp: finalTimestamp
            };

            try {
                await apiCall(`/counter/${name}`, 'PUT', payload);
                loadCounters();
            } catch (e) {} 
        };

        window.resetCounter = async (name) => {
            try {
                await apiCall(`/counter/${name}/reset`, 'POST');
                loadCounters();
            } catch (e) {}
        };

        window.deleteCounter = async (name) => {
            if (!confirm(`Are you sure you want to delete counter '${name}'?`)) return;
            try {
                await apiCall(`/counter/${name}`, 'DELETE');
                loadCounters();
            } catch (e) {}
        };

        window.triggerLockout = async () => {
            if (!confirm("WARNING: This irreversibly destroys the password file. The admin interface will return HTTP 403 until a new password is set via CLI. Continue?")) return;
            try {
                await apiCall(`/lockout`, 'POST');
                alert("Lockout successful. Admin interface is now locked.");
            } catch (e) {}
        };

        // Boot
        loadCounters();
        setInterval(tick, 1000);
    </script>
</body>
</html>

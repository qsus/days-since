<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Počet dní od (admin) – MFF UK</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="terminal-header">
        <div>
            <span class="prompt">root@matfyz</span>:<span class="path">/root</span>$
        </div>
        <div class="header-actions">
            <a href="/" class="btn action-btn">[~] VIEW STATUS</a>
            <button class="btn danger-btn" data-action="lockout">[!] INITIATE LOCKOUT</button>
        </div>
    </div>

    <div id="log"></div>

    <div class="auth-bar">
        <label>SUDO PASSWORD:</label>
        <input type="password" id="auth-pass" placeholder="********">
        <label class="remember-pass">
            <input type="checkbox" id="remember-pass">
            <span>Remember password</span>
        </label>
    </div>

    <div class="grid" id="counters-grid"></div>

    <script src="/index.js"></script>
</body>
</html>
